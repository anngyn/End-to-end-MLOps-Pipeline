<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">GitHub repository secrets setup</title>
  <desc id="desc">Mock GitHub settings page showing AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets.</desc>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="90" y="70" width="1020" height="480" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="90" y="70" width="1020" height="70" rx="14" fill="#0f172a"/>
  <text x="130" y="114" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">GitHub repository settings</text>
  <rect x="130" y="180" width="220" height="310" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="158" y="225" font-family="Arial, sans-serif" font-size="18" fill="#334155">Actions</text>
  <rect x="150" y="250" width="170" height="42" rx="6" fill="#dbeafe"/>
  <text x="170" y="277" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">Secrets</text>
  <text x="158" y="330" font-family="Arial, sans-serif" font-size="18" fill="#334155">Variables</text>
  <text x="158" y="378" font-family="Arial, sans-serif" font-size="18" fill="#334155">Environments</text>
  <text x="390" y="210" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Repository secrets</text>
  <text x="390" y="244" font-family="Arial, sans-serif" font-size="17" fill="#475569">Add credentials used by GitHub Actions build and deploy workflows.</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="390" y="285" width="650" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="420" y="322" font-weight="700" fill="#0f172a">AWS_ACCESS_KEY_ID</text>
    <text x="820" y="322" fill="#64748b">Updated now</text>
    <rect x="390" y="360" width="650" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="420" y="397" font-weight="700" fill="#0f172a">AWS_SECRET_ACCESS_KEY</text>
    <text x="820" y="397" fill="#64748b">Updated now</text>
    <rect x="390" y="435" width="650" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="420" y="472" font-weight="700" fill="#0f172a">AWS_REGION</text>
    <text x="820" y="472" fill="#64748b">us-east-1</text>
  </g>
</svg>
