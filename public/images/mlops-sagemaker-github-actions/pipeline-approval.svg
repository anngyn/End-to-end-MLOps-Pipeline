<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">SageMaker pipeline and model approval</title>
  <desc id="desc">Mock SageMaker Pipeline execution with model approval and endpoint deployment.</desc>
  <rect width="1200" height="620" fill="#f0fdf4"/>
  <text x="80" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#052e16">Validate pipeline, approve model, deploy endpoint</text>
  <rect x="80" y="135" width="1040" height="390" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="130" y="215" width="160" height="80" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="169" y="250" font-weight="700" fill="#14532d">Process</text>
    <text x="165" y="278" fill="#166534">Succeeded</text>
    <rect x="370" y="215" width="160" height="80" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="420" y="250" font-weight="700" fill="#14532d">Train</text>
    <text x="405" y="278" fill="#166534">Succeeded</text>
    <rect x="610" y="215" width="160" height="80" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="650" y="250" font-weight="700" fill="#14532d">Evaluate</text>
    <text x="646" y="278" fill="#166534">Succeeded</text>
    <rect x="850" y="215" width="190" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="890" y="250" font-weight="700" fill="#92400e">Register model</text>
    <text x="905" y="278" fill="#92400e">Pending approval</text>
    <path d="M290 255 H360 M530 255 H600 M770 255 H840" stroke="#16a34a" stroke-width="5"/>
    <rect x="260" y="380" width="270" height="70" rx="10" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="298" y="424" font-weight="700" fill="#1e3a8a">Approve in Model Registry</text>
    <rect x="670" y="380" width="270" height="70" rx="10" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="716" y="424" font-weight="700" fill="#4c1d95">Deploy endpoint workflow</text>
    <path d="M530 415 H660" stroke="#2563eb" stroke-width="5"/>
  </g>
</svg>
