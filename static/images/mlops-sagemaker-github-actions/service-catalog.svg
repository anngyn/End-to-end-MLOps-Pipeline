<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Service Catalog template for SageMaker project</title>
  <desc id="desc">Mock AWS console showing Service Catalog product connected to SageMaker Studio project creation.</desc>
  <rect width="1200" height="620" fill="#fff7ed"/>
  <rect x="78" y="70" width="1044" height="480" rx="16" fill="#ffffff" stroke="#fed7aa"/>
  <text x="120" y="125" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Service Catalog product</text>
  <text x="120" y="160" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">Expose custom SageMaker project template in Studio.</text>
  <rect x="120" y="210" width="420" height="260" rx="12" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="155" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#92400e">Custom template</text>
  <text x="155" y="306" font-family="Arial, sans-serif" font-size="18" fill="#78350f">GitHub owner</text>
  <text x="155" y="346" font-family="Arial, sans-serif" font-size="18" fill="#78350f">GitHub repository</text>
  <text x="155" y="386" font-family="Arial, sans-serif" font-size="18" fill="#78350f">CodeConnections ARN</text>
  <text x="155" y="426" font-family="Arial, sans-serif" font-size="18" fill="#78350f">Model package group</text>
  <path d="M560 340 H675" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect x="695" y="210" width="360" height="260" rx="12" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="735" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">SageMaker Studio</text>
  <text x="735" y="306" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Create project</text>
  <text x="735" y="346" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Provision resources</text>
  <text x="735" y="386" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Start GitHub workflows</text>
  <text x="735" y="426" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Register model group</text>
</svg>
