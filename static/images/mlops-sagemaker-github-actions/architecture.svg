<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end MLOps architecture with SageMaker and GitHub Actions</title>
  <desc id="desc">GitHub Actions starts SageMaker Pipeline. Model approval triggers EventBridge, Lambda, and deployment workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#334155" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">MLOps pipeline flow</text>
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="18" fill="#475569">Source changes build models. Model approval deploys endpoints.</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#0f172a">
    <g filter="url(#shadow)">
      <rect x="70" y="180" width="170" height="96" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="105" y="220" font-weight="700">GitHub</text>
      <text x="98" y="250" fill="#475569">Source repo</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="310" y="180" width="190" height="96" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="352" y="220" font-weight="700">GitHub Actions</text>
      <text x="358" y="250" fill="#475569">build.yml</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="570" y="170" width="190" height="116" rx="10" fill="#ffffff" stroke="#f59e0b"/>
      <text x="616" y="215" font-weight="700">SageMaker</text>
      <text x="605" y="245" fill="#475569">Pipeline run</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="830" y="180" width="190" height="96" rx="10" fill="#ffffff" stroke="#f59e0b"/>
      <text x="865" y="220" font-weight="700">Model Registry</text>
      <text x="870" y="250" fill="#475569">Approve model</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="190" y="400" width="190" height="96" rx="10" fill="#ffffff" stroke="#22c55e"/>
      <text x="230" y="440" font-weight="700">EventBridge</text>
      <text x="238" y="470" fill="#475569">Approval event</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="450" y="400" width="170" height="96" rx="10" fill="#ffffff" stroke="#22c55e"/>
      <text x="505" y="440" font-weight="700">Lambda</text>
      <text x="480" y="470" fill="#475569">Trigger deploy</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="690" y="400" width="190" height="96" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="735" y="440" font-weight="700">GitHub Actions</text>
      <text x="752" y="470" fill="#475569">deploy.yml</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="950" y="400" width="180" height="96" rx="10" fill="#ffffff" stroke="#f59e0b"/>
      <text x="992" y="440" font-weight="700">Endpoints</text>
      <text x="975" y="470" fill="#475569">Staging + prod</text>
    </g>
  </g>
  <g stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M240 228 H300"/>
    <path d="M500 228 H560"/>
    <path d="M760 228 H820"/>
    <path d="M925 276 C925 350 285 330 285 390"/>
    <path d="M380 448 H440"/>
    <path d="M620 448 H680"/>
    <path d="M880 448 H940"/>
  </g>
</svg>
